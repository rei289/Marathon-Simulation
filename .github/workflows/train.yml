name: Deploy Model Training on Cloud

on:
  workflow_dispatch:
    inputs:
      num_runs:
        description: 'Number of runs to execute'
        required: true
        default: 1
        type: integer

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Authenticate to Google Cloud
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          project_id: '${{ secrets.GCP_PROJECT_ID }}'
          workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: '${{ secrets.GCP_SA_EMAIL }}'

      # 2. Login to Docker (so GitHub can push to GCP)
      - name: Docker Auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # 3. Build and Push the Image
      # We tag it with the 'latest' label to keep things simple
      - name: Build and Push Container
        run: |
          DOCKER_TAG="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_REPOSITORY }}/stridesim-trainings:latest"
          docker build -f Trainings.Dockerfile -t $DOCKER_TAG .
          docker push $DOCKER_TAG

      # 4. Deploy to Cloud Run Job using the IMAGE
      - name: 'Deploy to Cloud Run Job'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          job: 'stridesim-trainings'
          region: 'us-central1'
          project_id: '${{ secrets.GCP_PROJECT_ID }}'
          image: 'us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_REPOSITORY }}/stridesim-trainings:latest'
          env_vars: |
            BUCKET_NAME=${{ vars.GCP_BUCKET_NAME }}
            EXECUTION_ENV=gcp
            NUM_RUNS=${{ inputs.num_runs }}
          flags: '--execute-now'

      # 5. Cleanup "Untagged" Images (The $0.00 bill insurance)
      # This deletes the hidden 'old versions' that Google stores behind the scenes
      - name: Cleanup Registry
        run: |
          gcloud artifacts docker images delete \
          us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_REPOSITORY }}/stridesim-trainings \
          --delete-tags --quiet --filter="NOT tags:latest" || true