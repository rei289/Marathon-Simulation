name: Python CI/CD

on:
  push:
    branches:
      - '**' # runs on every branch push
  pull_request:
    branches:
      - '**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # specifies the Python version to use

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Linting check with ruff
        run: |
          ruff check .

      - name: Run unit tests
        working-directory: ./tests # where the test files are located
        env:
          PYTHONPATH: ${{ github.workspace }} # tells Python to see the whole repo
        run: |
          python test_unit.py